# This workflow runs each test class in a separate job using a matrix strategy.
# This ensures that tests are independent and a failure in one does not stop others.

name: Java CI with Parallel Testing

on:
  push:
    branches:
        - master
  pull_request:
    branches:
        - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Keep running other tests even if one fails
      matrix:
        test-class: [
          "xin.bbtt.mcbot.util.UtilsTest",
          "xin.bbtt.mcbot.LangManagerTest",
          "xin.bbtt.mcbot.command.CommandManagerTest",
          "xin.bbtt.mcbot.event.EventManagerTest",
          "xin.bbtt.mcbot.plugin.PluginManagerIntegrationTest",
          "xin.bbtt.mcbot.command.CommandIntegrationTest",
          "xin.bbtt.mcbot.util.TranslationIntegrationTest",
          "xin.bbtt.mcbot.plugin.PluginFileLifecycleTest",
          "xin.bbtt.mcbot.listeners.CommandsRecorderTest",
          "xin.bbtt.mcbot.plugin.PluginClassloaderLeakTest",
          "xin.bbtt.mcbot.config.BotConfigDataTest",
          "xin.bbtt.mcbot.plugin.PluginYmlValidationTest"
        ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Test Class ${{ matrix.test-class }}
      run: mvn -B test -Dtest=${{ matrix.test-class }} --file pom.xml
